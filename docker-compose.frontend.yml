services:
  submit-service:
    build: ./submit-service
    container_name: submit-service
    ports:
      - "3001:3001"
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  submit-cache: